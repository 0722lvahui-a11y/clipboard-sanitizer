name: Build 赵赵牌act神器 (Windows)

on:
  push:
    branches: [main, master]
    paths:
      - 'zhaozhao_act_tool.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller pynput

      - name: Build executable
        run: pyinstaller --onefile --windowed --name "赵赵牌act神器" zhaozhao_act_tool.py

      - uses: actions/upload-artifact@v4
        with:
          name: 赵赵牌act神器-Windows
          path: dist/赵赵牌act神器.exe
