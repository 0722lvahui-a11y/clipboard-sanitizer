name: Build Clipboard History (macOS App)

on:
  push:
    branches: [main, master]
    paths:
      - 'clipboard_history.py'
      - 'build_macos_clipboard.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build executable
        run: |
          pip install pyinstaller
          pyinstaller --onefile --windowed --name "ClipboardHistory" clipboard_history.py

      - name: Package .app
        run: bash build_macos_clipboard.sh

      - name: Zip .app
        run: zip -r dist/ClipboardHistory.app.zip ClipboardHistory.app

      - uses: actions/upload-artifact@v4
        with:
          name: ClipboardHistory-macOS
          path: dist/ClipboardHistory.app.zip
