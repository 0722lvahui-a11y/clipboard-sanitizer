<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #ff6b8a 0%, #ff3d6f 30%, #ffb3c6 60%, #ff8fa3 100%);
    background-size: 400% 400%;
    animation: bgShift 8s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
    overflow: hidden;
    user-select: none;
  }

  @keyframes bgShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ====== 跳动的心 ====== */
  .heart-container {
    position: absolute;
    top: 18%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1;
  }

  .heart {
    width: 120px;
    height: 120px;
    background: #ff1744;
    position: relative;
    animation: heartbeat 0.8s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(255, 23, 68, 0.6))
            drop-shadow(0 0 60px rgba(255, 23, 68, 0.3));
  }

  .heart::before,
  .heart::after {
    content: "";
    width: 120px;
    height: 120px;
    background: #ff1744;
    border-radius: 50%;
    position: absolute;
  }

  .heart::before { top: -60px; left: 0; }
  .heart::after  { top: 0; left: -60px; }
  .heart { transform: rotate(-45deg); }

  @keyframes heartbeat {
    0%   { transform: rotate(-45deg) scale(1); }
    15%  { transform: rotate(-45deg) scale(1.25); }
    30%  { transform: rotate(-45deg) scale(1); }
    45%  { transform: rotate(-45deg) scale(1.18); }
    60%  { transform: rotate(-45deg) scale(1); }
    100% { transform: rotate(-45deg) scale(1); }
  }

  /* 心跳粒子 */
  .particle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: #ff6b8a;
    border-radius: 50%;
    animation: float 2s ease-out infinite;
    opacity: 0;
  }

  @keyframes float {
    0%   { opacity: 0.8; transform: translate(0, 0) scale(1); }
    100% { opacity: 0;   transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* ====== 对话框遮罩 ====== */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    backdrop-filter: blur(4px);
  }

  /* ====== 对话框卡片 ====== */
  .dialog {
    background: #fff;
    border-radius: 20px;
    padding: 40px 36px 32px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    max-width: 400px;
    width: 90%;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  @keyframes popIn {
    0%   { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }

  .dialog .icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .dialog .message {
    font-size: 20px;
    color: #333;
    margin-bottom: 28px;
    line-height: 1.6;
    font-weight: 600;
  }

  .dialog .buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
  }

  .btn {
    padding: 12px 40px;
    border: none;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: inherit;
    position: relative;
  }

  .btn-yes {
    background: linear-gradient(135deg, #ff1744, #ff6b8a);
    color: #fff;
    box-shadow: 0 4px 15px rgba(255, 23, 68, 0.4);
  }
  .btn-yes:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255, 23, 68, 0.5);
  }
  .btn-yes:active { transform: scale(0.95); }

  .btn-no {
    background: #f1f1f1;
    color: #999;
    position: relative;
    transition: all 0.15s ease;
  }
  .btn-no:hover { background: #e8e8e8; }

  /* ====== 提示气泡 ====== */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #fff;
    color: #ff1744;
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 700;
    box-shadow: 0 8px 30px rgba(255, 23, 68, 0.3);
    z-index: 100;
    animation: toastIn 0.4s ease, toastOut 0.4s ease 1.8s forwards;
    pointer-events: none;
  }

  @keyframes toastIn {
    0%   { opacity: 0; transform: translateX(-50%) translateY(-30px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes toastOut {
    0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  }

  /* ====== 计算器画面 ====== */
  .calc-scene {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 20;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    backdrop-filter: blur(6px);
  }
  .calc-scene.show { display: flex; }

  .calc-display {
    background: #1a1a2e;
    border-radius: 20px;
    padding: 36px 32px;
    text-align: right;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .calc-expr {
    color: #888;
    font-size: 22px;
    font-family: "Consolas", "Courier New", monospace;
    letter-spacing: 2px;
    min-height: 30px;
  }

  .calc-result {
    color: #ff6b8a;
    font-size: 64px;
    font-weight: 900;
    font-family: "Consolas", "Courier New", monospace;
    margin-top: 8px;
    text-shadow: 0 0 30px rgba(255, 107, 138, 0.6);
  }

  .calc-hint {
    color: #ffb3c6;
    font-size: 18px;
    margin-top: 16px;
    text-align: center;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1; }
  }

  /* 打字机效果 */
  .typing {
    display: inline-block;
    overflow: hidden;
    white-space: nowrap;
    border-right: 3px solid #ff6b8a;
    animation: typing 2s steps(30, end), blink 0.6s step-end infinite;
    width: 0;
  }

  @keyframes typing {
    from { width: 0; }
    to   { width: 100%; }
  }

  @keyframes blink {
    50% { border-color: transparent; }
  }

  /* 飘落的爱心 */
  .falling-heart {
    position: fixed;
    font-size: 24px;
    animation: fall linear forwards;
    pointer-events: none;
    z-index: 30;
  }

  @keyframes fall {
    0%   { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

  <!-- 跳动的心 -->
  <div class="heart-container">
    <div class="heart"></div>
  </div>

  <!-- 对话框 -->
  <div class="overlay" id="dialogOverlay">
    <div class="dialog">
      <div class="icon">🐷</div>
      <div class="message">请允许黑毛猪<br>为你表演</div>
      <div class="buttons">
        <button class="btn btn-yes" id="btnYes">是 💖</button>
        <button class="btn btn-no"  id="btnNo">否</button>
      </div>
    </div>
  </div>

  <!-- 计算器画面 -->
  <div class="calc-scene" id="calcScene">
    <div class="calc-display">
      <div class="calc-expr" id="calcExpr"></div>
      <div class="calc-result" id="calcResult"></div>
      <div class="calc-hint" id="calcHint"></div>
    </div>
  </div>

<script>
  // ====== 粒子特效 ======
  const heartEl = document.querySelector('.heart');
  function spawnParticle() {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random() * Math.PI * 2;
    const dist  = 50 + Math.random() * 60;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    p.style.left = '60px';
    p.style.top  = '60px';
    p.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
    heartEl.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
  setInterval(spawnParticle, 250);

  // ====== 否 按钮 ======
  const btnNo = document.getElementById('btnNo');
  const btnYes = document.getElementById('btnYes');
  let noCount = 0;

  btnNo.addEventListener('mouseenter', () => {
    // 按钮逃跑
    const maxX = window.innerWidth - btnNo.offsetWidth - 40;
    const maxY = window.innerHeight - btnNo.offsetHeight - 40;
    const rx = Math.random() * maxX;
    const ry = Math.random() * maxY;
    btnNo.style.position = 'fixed';
    btnNo.style.left = rx + 'px';
    btnNo.style.top  = ry + 'px';
    btnNo.style.zIndex = '50';
  });

  btnNo.addEventListener('click', () => {
    noCount++;
    const msgs = [
      '必须点是，公主。',
      '不许点否！👑',
      '黑毛猪伤心了 💔',
      '再给你一次机会～',
      '公主，点"是"吧 🥺',
    ];
    showToast(msgs[noCount % msgs.length]);

    // 是 按钮变大
    const scale = 1 + noCount * 0.15;
    btnYes.style.transform = `scale(${scale})`;
    btnYes.style.transition = 'transform 0.3s ease';
  });

  function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2300);
  }

  // ====== 是 按钮 ======
  btnYes.addEventListener('click', () => {
    document.getElementById('dialogOverlay').style.display = 'none';
    const scene = document.getElementById('calcScene');
    scene.classList.add('show');

    // 庆祝爱心雨
    spawnHeartRain();

    // 打字机逐字显示算式
    const expr = '100+100+100+100+100+20';
    const exprEl = document.getElementById('calcExpr');
    const resultEl = document.getElementById('calcResult');
    const hintEl = document.getElementById('calcHint');

    let i = 0;
    function typeChar() {
      if (i < expr.length) {
        exprEl.textContent += expr[i];
        i++;
        setTimeout(typeChar, 150);
      } else {
        // 显示结果
        setTimeout(() => {
          resultEl.textContent = '= 520';
          resultEl.style.animation = 'popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
          hintEl.textContent = '💕 五二零 · 我爱你 💕';
        }, 400);
      }
    }
    typeChar();
  });

  // ====== 爱心雨 ======
  function spawnHeartRain() {
    const hearts = ['❤️','💕','💖','💗','💝','💘','🐷','✨'];
    for (let i = 0; i < 40; i++) {
      setTimeout(() => {
        const h = document.createElement('span');
        h.className = 'falling-heart';
        h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        h.style.left = Math.random() * 100 + '%';
        h.style.fontSize = (16 + Math.random() * 28) + 'px';
        h.style.animationDuration = (2 + Math.random() * 3) + 's';
        h.style.animationDelay = Math.random() * 0.5 + 's';
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 4000);
      }, i * 60);
    }
  }
</script>

</body>
</html>
